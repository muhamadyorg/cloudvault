services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: cloudvault
      POSTGRES_PASSWORD: cloudvault_pass
      POSTGRES_DB: cloudvault
    volumes:
      - cloudvault_db:/var/lib/postgresql/data
    networks:
      - cloudvault_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cloudvault"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://cloudvault:cloudvault_pass@db:5432/cloudvault
      SESSION_SECRET: SHUBU_YERGA_OZ_PAROLINGIZNI_YOZING_KAMIDA_32_BELGI
      NODE_ENV: production
    volumes:
      - cloudvault_uploads:/app/uploads
    networks:
      - cloudvault_net
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const h=require('http');h.get('http://localhost:5000/health',r=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))\""]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 60s

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "5055:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - cloudvault_net
    depends_on:
      app:
        condition: service_healthy

volumes:
  cloudvault_db:
  cloudvault_uploads:

networks:
  cloudvault_net:
    driver: bridge
